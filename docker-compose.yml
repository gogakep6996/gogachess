# =====================================================================
# gogachess: одна команда `docker compose up -d --build` поднимает
# Postgres + приложение. Перед стартом скопируйте .env.example в .env
# и поправьте переменные.
# =====================================================================
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gogachess}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gogachess}
      POSTGRES_DB: ${POSTGRES_DB:-gogachess}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gogachess} -d ${POSTGRES_DB:-gogachess}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      # connection_limit=20: чтобы тикер турниров (несколько параллельных запросов
      # каждые 5 секунд) не упирался в дефолтный пул Prisma из 3 коннектов (ошибка P2024).
      DATABASE_URL: postgresql://${POSTGRES_USER:-gogachess}:${POSTGRES_PASSWORD:-gogachess}@db:5432/${POSTGRES_DB:-gogachess}?schema=public&connection_limit=20&pool_timeout=30
      SITE_URL: ${SITE_URL:-}
      # ВНИМАНИЕ: NEXT_PUBLIC_ICE_SERVERS оставлен как fallback, если сервер не вернёт ICE-сервера
      # через socket-событие 'audio:get-ice-servers'. Основной путь — динамические HMAC-creds
      # для собственного coturn (см. ниже сервис `turn`).
      NEXT_PUBLIC_ICE_SERVERS: ${NEXT_PUBLIC_ICE_SERVERS:-[{"urls":"stun:stun.l.google.com:19302"}]}
      # Параметры собственного TURN — используются сервером для генерации коротких credentials.
      TURN_SECRET: ${TURN_SECRET:-}
      TURN_REALM: ${TURN_REALM:-}
      TURN_HOST: ${TURN_HOST:-}
      # Стабилизирует Server Actions между пересборками (см. next.config.mjs).
      SERVER_ACTIONS_ENCRYPTION_KEY: ${SERVER_ACTIONS_ENCRYPTION_KEY:-}
    # На хосте 3001: внутри контейнера приложение всё ещё на 3000.
    # Так не конфликтует с шаблонным Node.js на VPS, который часто занимает :3000.
    ports:
      - "127.0.0.1:3001:3000"

  # ----------------------------------------------------------------------------
  # Собственный TURN/STUN-сервер (coturn).
  # Зачем: без этого аудио не проходит через мобильные операторы (CGNAT) и
  # многие корпоративные/гостиничные Wi-Fi, где UDP P2P-соединения зарезаны.
  #
  # network_mode: host — критически важно. Coturn использует случайные
  # high-порты (49152-65535/udp) для relay-каналов. Если их пробрасывать
  # через стандартный Docker NAT, Docker должен слушать ~16 000 портов, что
  # на практике не работает. С `host` контейнер слушает прямо на интерфейсе
  # VPS, без NAT-промежутка.
  #
  # Credentials НЕ статичные: сервер приложения генерирует HMAC-SHA1 от
  # `static-auth-secret` (RFC 7635), валидный 1 час. Утечка username/credential
  # из браузера не критична — через час они инвалидны.
  # ----------------------------------------------------------------------------
  turn:
    image: coturn/coturn:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      # Сертификат от Let's Encrypt для TURNS (TLS). Read-only.
      - /etc/letsencrypt/live/${TURN_REALM:-gogachess.ru}:/certs/live:ro
      - /etc/letsencrypt/archive/${TURN_REALM:-gogachess.ru}:/certs/archive:ro
    # Параметры передаём аргументами (coturn все опции читает с CLI),
    # чтобы не возиться с конфиг-файлом и подстановками.
    command:
      - "-n"
      - "--listening-port=3478"
      - "--tls-listening-port=5349"
      - "--listening-ip=0.0.0.0"
      - "--external-ip=${TURN_EXTERNAL_IP:?set TURN_EXTERNAL_IP in .env}"
      - "--relay-ip=${TURN_EXTERNAL_IP:?set TURN_EXTERNAL_IP in .env}"
      - "--realm=${TURN_REALM:-gogachess.ru}"
      - "--fingerprint"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET:?set TURN_SECRET in .env}"
      - "--total-quota=100"
      - "--stale-nonce=600"
      - "--cert=/certs/live/fullchain.pem"
      - "--pkey=/certs/live/privkey.pem"
      - "--no-tlsv1"
      - "--no-tlsv1_1"
      - "--no-cli"
      - "--min-port=49152"
      - "--max-port=65535"
      - "--log-file=stdout"
      - "--simple-log"

volumes:
  db-data:
